<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CemAbyss | Zoro(dev)</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #a855f7; --bg: #000000; --card: #0a0a0a; --nav: rgba(5, 5, 5, 0.95); --border: rgba(255, 255, 255, 0.08); --text: #ffffff; --text-dim: #94a3b8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        ::-webkit-scrollbar { width: 0px; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; }
        #auth-shield { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .auth-box { background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid var(--border); width: 95%; max-width: 400px; text-align: center; }
        nav { background: var(--nav); backdrop-filter: blur(20px); height: 64px; display: none; align-items: center; justify-content: space-between; padding: 0 24px; position: fixed; top: 0; width: 100%; z-index: 2000; border-bottom: 1px solid var(--border); }
        .logo { font-size: 20px; font-weight: 800; color: white; text-decoration: none; }
        .logo span { color: var(--primary); }
        .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 5px; z-index: 2001; }
        .hamburger div { width: 25px; height: 3px; background: white; border-radius: 5px; }
        aside { width: 240px; height: 100vh; position: fixed; top: 64px; padding: 20px 16px; background: var(--bg); border-right: 1px solid var(--border); z-index: 1900; transition: transform 0.3s ease; }
        .side-item { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: var(--text-dim); border-radius: 14px; margin-bottom: 4px; font-size: 14px; font-weight: 600; }
        .side-item:hover, .side-item.active { background: rgba(255,255,255,0.05); color: white; }
        .side-item.active { color: var(--primary); background: rgba(168, 85, 247, 0.1); }
        main { margin-left: 240px; margin-top: 64px; padding: 24px; min-height: calc(100vh - 64px); }
        .page-view { display: none; }
        .page-view.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .card { position: relative; width: 100%; z-index: 5; }
        .v-thumb-wrap { width: 100%; aspect-ratio: 16/9; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); background: #050505; cursor: pointer; position: relative; }
        .v-img-prev { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; pointer-events: none; }
        .dots-btn { position: absolute; top: 10px; right: 10px; width: 30px; height: 30px; background: rgba(0,0,0,0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; border: 1px solid var(--border); }
        .dropdown { display: none; position: absolute; top: 45px; right: 0; background: #111; border: 1px solid var(--border); border-radius: 12px; width: 150px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dropdown div { padding: 12px; font-size: 13px; cursor: pointer; color: #ccc; }
        #player-page { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 5000; overflow-y: auto; padding-top: 64px; }
        .player-layout { display: grid; grid-template-columns: 1fr 380px; gap: 24px; max-width: 1700px; margin: 0 auto; padding: 20px; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
        video, img.p-media { width: 100%; height: 100%; object-fit: contain; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 8000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-box { background: var(--card); padding: 32px; border-radius: 24px; width: 90%; max-width: 480px; border: 1px solid var(--border); }
        .prog-bg { width: 100%; height: 6px; background: #111; border-radius: 10px; margin: 20px 0; display: none; overflow: hidden; }
        .prog-bar { width: 0%; height: 100%; background: var(--primary); transition: 0.3s; }
        input, textarea { width: 100%; background: #111; border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: #fff; margin-bottom: 12px; font-family: inherit; }
        button.primary-btn { width: 100%; padding: 16px; background: var(--primary); color: #fff; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; }
        .v-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; color: black; cursor: pointer; }
        .badge { background: var(--primary); border-radius: 50%; width: 14px; height: 14px; display: inline-flex; align-items: center; justify-content: center; font-size: 8px; color: white; margin-left: 4px; }
        
        #comments-container { margin-top: 24px; border-top: 1px solid var(--border); padding-top: 20px; }
        .comment-item { display: flex; gap: 12px; margin-bottom: 20px; position: relative; }
        .comment-text { font-size: 14px; line-height: 1.4; color: var(--text); }
        .comment-user { font-weight: 800; font-size: 13px; margin-bottom: 4px; cursor: pointer; }
        .comment-user:hover { color: var(--primary); }
        .rec-card { display: flex; gap: 12px; cursor: pointer; margin-bottom: 12px; }
        .rec-thumb { width: 140px; aspect-ratio: 16/9; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; flex-shrink: 0; }
        .rec-info { overflow: hidden; }

        @media (max-width: 900px) { .hamburger { display: flex; } aside { transform: translateX(-100%); width: 280px; background: #050505; } aside.open { transform: translateX(0); } main { margin-left: 0; padding: 15px; } .grid { grid-template-columns: 1fr; } .player-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body onclick="closeAllMenus(); closeSidebar();">
<div id="auth-shield">
    <div class="auth-box" onclick="event.stopPropagation()">
        <h1>CEM<span>ABYSS</span></h1>
        <input type="text" id="login-user" placeholder="Username">
        <input type="password" id="login-pass" placeholder="Password">
        <button class="primary-btn" onclick="handleAuth()">Continue</button>
        <p onclick="toggleAuthMode()" id="auth-toggle" style="color:var(--primary); cursor:pointer; font-weight:800; margin-top:20px;">No account? Register</p>
    </div>
</div>
<nav id="nav-bar">
    <div style="display:flex; align-items:center; gap:15px;">
        <div class="hamburger" onclick="event.stopPropagation(); toggleSidebar()"><div></div><div></div><div></div></div>
        <a href="#" class="logo" onclick="location.reload()">CEM<span>ABYSS</span></a>
    </div>
    <div style="display:flex; align-items:center; gap:12px;">
        <span id="u-name-display" style="font-size:12px; font-weight:800; color:var(--primary);"></span>
        <div id="nav-avatar" class="v-avatar" onclick="openProfile(currentUser)"></div>
        <button onclick="logout()" style="background:transparent; border:none; color:var(--text-dim); font-size:12px; font-weight:800; cursor:pointer;">Logout</button>
    </div>
</nav>
<aside id="side-bar" onclick="event.stopPropagation()">
    <div class="side-item active" onclick="setContext('home', this)">🏠 Home</div>
    <div class="side-item" onclick="setContext('imageboard', this)">🖼️ Images</div>
    <div class="side-item" onclick="setContext('studio', this)">🎬 Studio</div>
    <div class="side-item" style="color:var(--primary); margin-top:10px;" onclick="openUpload()">📤 Upload</div>
</aside>
<main id="main-area" style="display:none;">
    <div id="view-home" class="page-view active"><div class="grid" id="v-grid"></div></div>
    <div id="view-profile" class="page-view">
        <div id="profile-head" style="text-align:center; padding: 40px 0; border-bottom:1px solid var(--border)"></div>
        <div class="grid" id="profile-grid" style="margin-top:30px;"></div>
    </div>
</main>
<div id="player-page">
    <div class="player-layout">
        <div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <span onclick="closePlayer()" style="cursor:pointer; color:var(--text-dim); font-weight:800;">← EXIT</span>
                <span onclick="playNext()" style="cursor:pointer; color:var(--primary); font-weight:800;">UP NEXT →</span>
            </div>
            <div class="video-wrapper" id="p-target"></div>
            <div style="margin-top:20px; padding:20px; background:rgba(255,255,255,0.02); border-radius:15px; border:1px solid var(--border)">
                <h1 id="p-title" style="margin:0; font-size:22px;"></h1>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <div id="p-avatar" class="v-avatar" style="width:40px; height:40px;"></div>
                        <div><div id="p-uploader" style="font-weight:800; cursor:pointer;"></div><div id="p-subs" style="font-size:12px; color:gray;"></div></div>
                        <button id="sub-btn" class="primary-btn" style="width:auto; padding:8px 15px; font-size:12px;" onclick="toggleSub()">SUBSCRIBE</button>
                    </div>
                    <button onclick="handleLike()" style="background:#111; color:white; border:1px solid var(--border); padding:8px 15px; border-radius:100px; cursor:pointer;">❤️ <span id="p-likes">0</span></button>
                </div>
                <p id="p-desc-content" style="color:var(--text-dim); margin-top:15px; font-size:14px;"></p>
                <div id="comments-container">
                    <h3 style="margin-top:0">Comments</h3>
                    <div style="display:flex; gap:10px; margin-bottom:20px;">
                        <input type="text" id="comm-input" placeholder="Add a comment..." style="margin-bottom:0">
                        <button class="primary-btn" style="width:auto; padding:0 20px" onclick="postComment()">Post</button>
                    </div>
                    <div id="comments-list"></div>
                </div>
            </div>
        </div>
        <div>
            <h3 style="margin-top:0">Up Next</h3>
            <div id="rec-grid"></div>
        </div>
    </div>
</div>
<div id="modal-upload" class="modal-overlay">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h3>Upload</h3>
        <input type="text" id="vid-name" placeholder="Title">
        <textarea id="vid-desc" placeholder="Description..." rows="3"></textarea>
        <input type="file" id="vid-input">
        <div class="prog-bg" id="prog-bg"><div class="prog-bar" id="prog-bar"></div></div>
        <button class="primary-btn" id="publish-btn" onclick="handleUpload()">Publish</button>
        <p onclick="closeUpload()" style="text-align:center; color:gray; cursor:pointer; margin-top:15px;">Cancel</p>
    </div>
</div>
<div id="modal-edit" class="modal-overlay">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h3>Edit</h3>
        <input type="text" id="edit-title">
        <textarea id="edit-desc" rows="4"></textarea>
        <button class="primary-btn" onclick="saveEdit()">Save Changes</button>
        <p onclick="closeEdit()" style="text-align:center; color:gray; cursor:pointer; margin-top:15px;">Cancel</p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const CLOUD_NAME='dncftuhoo', UPLOAD_PRESET='cemabyss', SUPABASE_URL='https://xqvvwejwkmqdmsorqdzp.supabase.co', SUPABASE_KEY='sb_publishable_WLR6XzQijI3h1-oWa6T-mg_FeolGe9z', ADMIN_USER="Zoro";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser=localStorage.getItem('cem_user'), allVideos=[], allProfiles=[], currentCtx='home', authMode='login', activeVideo=null, editingId=null;
    function toggleSidebar(){document.getElementById('side-bar').classList.toggle('open');}
    function closeSidebar(){document.getElementById('side-bar').classList.remove('open');}
    function logout(){localStorage.removeItem('cem_user'); location.reload(); }
    function toggleAuthMode(){authMode=authMode==='login'?'register':'login'; document.getElementById('auth-toggle').innerText=authMode==='login'?'No account? Register':'Have an account? Login';}
    function getCol(n){let h=0; if(n){for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);} return `hsl(${Math.abs(h)%360}, 70%, 60%)`;}
    async function handleAuth(){
        const u=document.getElementById('login-user').value.trim(), p=document.getElementById('login-pass').value.trim();
        const {data:profile}=await supabaseClient.from('profiles').select('*').eq('username',u).maybeSingle();
        if(authMode==='login'){
            if(u===ADMIN_USER && p==="cem") return loginSuccess(u);
            if(profile && (profile.pass===p || p==="hi")) return loginSuccess(u);
            alert("Fail");
        } else {
            if(profile) return alert("Taken");
            await supabaseClient.from('profiles').insert([{username:u, pass:p, subscribers:0}]);
            loginSuccess(u);
        }
    }
    function loginSuccess(u){localStorage.setItem('cem_user',u); location.reload();}
    async function fetchData(){
        const {data:v}=await supabaseClient.from('videos').select('*').order('id',{ascending:false});
        const {data:p}=await supabaseClient.from('profiles').select('*');
        allVideos=v||[]; allProfiles=p||[]; render(); updateNav();
    }
    function updateNav(){
        document.getElementById('u-name-display').innerText = currentUser;
        const av = document.getElementById('nav-avatar'); av.style.background = getCol(currentUser); av.innerText = currentUser?currentUser[0].toUpperCase():'?';
    }
    function setContext(ctx, el){
        currentCtx=ctx; document.querySelectorAll('.side-item').forEach(i=>i.classList.remove('active'));
        if(el) el.classList.add('active'); closeSidebar();
        document.querySelectorAll('.page-view').forEach(p=>p.classList.remove('active'));
        document.getElementById('view-home').classList.add('active'); render();
    }
    function render(target='v-grid', list=null){
        const grid=document.getElementById(target); let d=list||allVideos;
        if(currentCtx==='imageboard') d=d.filter(v=>v.url.match(/\.(jpg|jpeg|png|webp|gif)$/i));
        else if(currentCtx==='home') d=d.filter(v=>v.url && !v.url.match(/\.(jpg|jpeg|png|webp|gif)$/i));
        else if(currentCtx==='studio') d=d.filter(v=>v.uploader===currentUser);
        grid.innerHTML = d.map(v=>{
            const cP = allProfiles.find(x=>x.username===currentUser);
            const isO = cP?.is_verified || v.uploader===currentUser;
            const p = allProfiles.find(x=>x.username===v.uploader);
            return `<div class="card">
                <div class="dots-btn" onclick="event.stopPropagation(); toggleMenu(event,'${v.id}')">⋮</div>
                <div id="menu-${v.id}" class="dropdown">
                    <div onclick="openProfile('${v.uploader}')">👤 Channel</div>
                    ${isO ? `<div onclick="openEdit('${v.id}','${v.title}','${encodeURIComponent(v.details||'')}')">📝 Edit</div><div onclick="deleteVideo('${v.id}')" style="color:red">🗑️ Delete</div>` : ''}
                </div>
                <div class="v-thumb-wrap" onclick="playVideo('${v.id}')"><img src="${v.thumb}" class="v-img-prev"></div>
                <div style="display:flex; gap:12px; padding:12px 0;">
                    <div class="v-avatar" style="background:${getCol(v.uploader)}" onclick="event.stopPropagation(); openProfile('${v.uploader}')">${v.uploader?v.uploader[0]:'?'}</div>
                    <div><div style="font-weight:700;">${v.title}</div><div style="font-size:12px;color:gray;">${v.uploader} ${p?.is_verified?'<span class="badge">✓</span>':''}</div></div>
                </div>
            </div>`;
        }).join('');
    }
    async function playVideo(id){
        activeVideo=allVideos.find(v=>v.id == id); document.getElementById('player-page').style.display='block';
        const p = allProfiles.find(x=>x.username===activeVideo.uploader);
        document.getElementById('p-title').innerText=activeVideo.title;
        document.getElementById('p-uploader').innerText=activeVideo.uploader;
        document.getElementById('p-uploader').onclick=()=>openProfile(activeVideo.uploader);
        document.getElementById('p-avatar').style.background=getCol(activeVideo.uploader);
        document.getElementById('p-avatar').innerText=activeVideo.uploader[0];
        document.getElementById('p-avatar').onclick=()=>openProfile(activeVideo.uploader);
        document.getElementById('p-subs').innerText=`${p?.subscribers||0} subscribers`;
        document.getElementById('p-likes').innerText=activeVideo.likes||0;
        document.getElementById('p-desc-content').innerText=activeVideo.details||"";
        const t=document.getElementById('p-target');
        t.innerHTML = activeVideo.url.match(/\.(jpg|jpeg|png|webp|gif)$/i) ? `<img src="${activeVideo.url}" class="p-media">` : `<video controls autoplay src="${activeVideo.url}"></video>`;
        await supabaseClient.from('videos').update({views:(activeVideo.views||0)+1}).eq('id',id);
        renderRecs(); loadComments();
    }
    function renderRecs(){
        const rG = document.getElementById('rec-grid');
        const l = allVideos.filter(v=>v.id != activeVideo.id).slice(0,10);
        rG.innerHTML = l.map(v => `<div class="rec-card" onclick="playVideo('${v.id}')"><div class="rec-thumb"><img src="${v.thumb}" style="width:100%;height:100%;object-fit:cover"></div><div class="rec-info"><div class="rec-title">${v.title}</div><div style="font-size:12px;color:gray;margin-top:4px">${v.uploader}</div></div></div>`).join('');
    }
    function playNext(){ const n = allVideos.filter(v=>v.id != activeVideo.id)[0]; if(n) playVideo(n.id); }
    async function postComment(){
        const txt = document.getElementById('comm-input').value.trim(); if(!txt) return;
        let existing = activeVideo.comments ? JSON.parse(activeVideo.comments) : [];
        existing.push({ user: currentUser, text: txt, time: Date.now() });
        const { error } = await supabaseClient.from('videos').update({ comments: JSON.stringify(existing) }).eq('id', activeVideo.id);
        if(!error) { activeVideo.comments = JSON.stringify(existing); document.getElementById('comm-input').value = ''; loadComments(); }
    }
    function loadComments(){
        const list = document.getElementById('comments-list');
        const arr = activeVideo.comments ? JSON.parse(activeVideo.comments) : [];
        const cP = allProfiles.find(x=>x.username===currentUser);
        list.innerHTML = arr.reverse().map((c, i) => `
            <div class="comment-item">
                <div class="v-avatar" style="width:32px; height:32px; font-size:12px; background:${getCol(c.user)}" onclick="openProfile('${c.user}')">${c.user[0]}</div>
                <div style="flex:1">
                    <div class="comment-user" onclick="openProfile('${c.user}')">${c.user}</div>
                    <div class="comment-text">${c.text}</div>
                </div>
                ${(cP?.is_verified || c.user === currentUser) ? `<div onclick="deleteComment(${i})" style="color:red; font-size:10px; cursor:pointer">Delete</div>` : ''}
            </div>`).join('');
    }
    async function deleteComment(idx){
        let arr = JSON.parse(activeVideo.comments); arr.reverse().splice(idx, 1); arr.reverse();
        await supabaseClient.from('videos').update({ comments: JSON.stringify(arr) }).eq('id', activeVideo.id);
        activeVideo.comments = JSON.stringify(arr); loadComments();
    }
    async function handleLike(){
        const n=(activeVideo.likes||0)+1; await supabaseClient.from('videos').update({likes:n}).eq('id',activeVideo.id);
        document.getElementById('p-likes').innerText=n; activeVideo.likes=n;
    }
    async function toggleSub(){
        const b=document.getElementById('sub-btn'); b.classList.toggle('active');
        const isS = b.classList.contains('active'); b.innerText = isS?'SUBSCRIBED':'SUBSCRIBE';
        const p = allProfiles.find(x=>x.username===activeVideo.uploader);
        const n = isS?(p.subscribers+1):Math.max(0,p.subscribers-1);
        await supabaseClient.from('profiles').update({subscribers:n}).eq('username',activeVideo.uploader);
        document.getElementById('p-subs').innerText=`${n} subscribers`; p.subscribers=n;
    }
    async function handleUpload(){
        const v=document.getElementById('vid-input').files[0]; if(!v)return;
        const btn=document.getElementById('publish-btn'), bar=document.getElementById('prog-bar'), bg=document.getElementById('prog-bg');
        btn.disabled=true; bg.style.display='block'; bar.style.width="30%";
        const fd=new FormData(); fd.append('file',v); fd.append('upload_preset',UPLOAD_PRESET);
        try {
            const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`,{method:"POST",body:fd});
            const d=await r.json(); bar.style.width="70%";
            const t=d.resource_type==='video'?d.secure_url.replace(/\.[^/.]+$/,".jpg"):d.secure_url;
            await supabaseClient.from('videos').insert([{title:document.getElementById('vid-name').value||v.name, uploader:currentUser, url:d.secure_url, thumb:t, views:0, likes:0, details:document.getElementById('vid-desc').value}]);
            bar.style.width="100%"; setTimeout(()=>location.reload(),800);
        } catch(e){alert("Fail"); btn.disabled=false;}
    }
    function openProfile(user){
        currentCtx='profile'; document.querySelectorAll('.page-view').forEach(p=>p.classList.remove('active'));
        document.getElementById('view-profile').classList.add('active');
        const p = allProfiles.find(x=>x.username===user);
        document.getElementById('profile-head').innerHTML = `<div class="v-avatar" style="width:80px;height:80px;font-size:30px;margin:0 auto;background:${getCol(user)}">${user?user[0]:'?'}</div><h2 style="margin:10px 0 5px">${user} ${p?.is_verified?'<span class="badge" style="width:18px;height:18px">✓</span>':''}</h2><p style="color:gray">${p?.subscribers||0} subscribers</p>`;
        render('profile-grid', allVideos.filter(v=>v.uploader===user));
        closePlayer();
    }
    function openEdit(id,t,d){editingId=id; document.getElementById('edit-title').value=t; document.getElementById('edit-desc').value=decodeURIComponent(d); document.getElementById('modal-edit').style.display='flex';}
    async function saveEdit(){await supabaseClient.from('videos').update({title:document.getElementById('edit-title').value, details:document.getElementById('edit-desc').value}).eq('id',editingId); location.reload();}
    function toggleMenu(e,id){e.stopPropagation(); closeAllMenus(); document.getElementById(`menu-${id}`).style.display='block';}
    function closeAllMenus(){document.querySelectorAll('.dropdown').forEach(d=>d.style.display='none');}
    async function deleteVideo(id){if(confirm("Delete?")){await supabaseClient.from('videos').delete().eq('id',id); location.reload();}}
    function openUpload(){document.getElementById('modal-upload').style.display='flex';}
    function closeUpload(){document.getElementById('modal-upload').style.display='none';}
    function closeEdit(){document.getElementById('modal-edit').style.display='none';}
    function closePlayer(){document.getElementById('player-page').style.display='none'; document.getElementById('p-target').innerHTML="";}
    if(currentUser){document.getElementById('nav-bar').style.display='flex'; document.getElementById('main-area').style.display='block'; fetchData();}
    else{document.getElementById('auth-shield').style.display='flex';}
</script>
</body>
</html>
