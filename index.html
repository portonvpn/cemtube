<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CemAbyss | Zoro(dev)</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #a855f7; --secondary: #22d3ee; --bg: #020202; --glass: rgba(5, 5, 5, 0.98); --border: rgba(255, 255, 255, 0.08); --text: #ffffff; --text-dim: #71717a; }
        * { box-sizing: border-box; transition: all 0.2s ease; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 0px; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; }
        #auth-shield { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .auth-box { background: #0a0a0a; padding: 40px; border-radius: 24px; border: 1px solid var(--border); width: 90%; max-width: 360px; text-align: center; }
        nav { background: var(--glass); backdrop-filter: blur(30px); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid var(--border); }
        .search-container { flex: 1; max-width: 500px; margin: 0 20px; }
        .search-bar { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 10px 15px; border-radius: 10px; color: white; outline: none; }
        .logo { font-size: 18px; font-weight: 800; color: white; text-decoration: none; }
        .logo span { color: var(--primary); }
        aside { width: 240px; height: 100vh; position: fixed; top: 60px; padding: 25px 15px; background: var(--bg); border-right: 1px solid var(--border); z-index: 999; }
        .side-item { padding: 12px 18px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: var(--text-dim); border-radius: 12px; margin-bottom: 6px; font-size: 14px; }
        .side-item:hover, .side-item.active { background: rgba(255,255,255,0.05); color: white; }
        .side-item.active { color: var(--primary); background: rgba(168, 85, 247, 0.12); }
        main { margin-left: 240px; margin-top: 60px; padding: 25px; min-height: calc(100vh - 60px); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { position: relative; }
        .v-thumb-wrap { width: 100%; aspect-ratio: 16/9; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; background: #050505; position: relative; cursor: pointer; }
        .v-img-prev { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; }
        .dots-btn { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; background: rgba(0,0,0,0.65); backdrop-filter: blur(8px); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 20; border: 1px solid var(--border); color: white; }
        .dropdown { display: none; position: absolute; top: 50px; right: 12px; background: #0f0f0f; border: 1px solid var(--border); border-radius: 14px; width: 180px; z-index: 100; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        .dropdown div { padding: 12px 16px; font-size: 13px; cursor: pointer; color: #bbb; display: flex; align-items: center; gap: 10px; }
        .v-info { display: flex; gap: 14px; padding: 14px 4px; }
        .v-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; flex-shrink: 0; }
        #player-page { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; overflow-y: auto; padding-top: 60px; }
        .player-layout { display: grid; grid-template-columns: 1fr 380px; gap: 30px; max-width: 1700px; margin: 0 auto; padding: 20px; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #050505; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        video, img.large-img { width: 100%; height: 100%; object-fit: contain; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .modal-box { background: #0a0a0a; padding: 30px; border-radius: 24px; width: 90%; max-width: 420px; border: 1px solid var(--border); text-align: center; }
        input, select, textarea { width: 100%; background: #111; border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: white; margin-bottom: 12px; outline: none; font-family: inherit; }
        .sub-btn { background: white; color: black; border: none; padding: 10px 20px; border-radius: 100px; font-weight: 800; cursor: pointer; font-size: 13px; }
        .sub-btn.active { background: #222; color: white; border: 1px solid var(--border); }
        .prog-bg { width: 100%; height: 6px; background: #111; margin: 20px 0; display: none; border-radius: 10px; overflow: hidden; }
        .prog-bar { width: 0; height: 100%; background: var(--secondary); transition: 0.3s; }
        @media (max-width: 900px) { aside { display: none; } main { margin-left: 0; } .player-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body onclick="closeAllMenus()">
<div id="auth-shield">
    <div class="auth-box">
        <h2>System Access</h2>
        <input type="text" id="login-user" placeholder="Username">
        <input type="password" id="login-pass" placeholder="Password">
        <button onclick="handleAuth()" style="width:100%; padding:14px; background:white; color:black; border:none; border-radius:12px; font-weight:800; cursor:pointer;">LOG IN</button>
    </div>
</div>
<nav>
    <a href="#" class="logo" onclick="location.reload()">CEM<span>ABYSS</span></a>
    <div class="search-container"><input type="text" class="search-bar" id="main-search" placeholder="Search CemAbyss..." oninput="handleSearch()"></div>
    <div style="display:flex; align-items:center; gap:12px;"><span id="user-display" style="font-size: 11px; color: var(--secondary); font-weight: 800; text-transform: uppercase;"></span><button onclick="logout()" style="background:transparent; border:1px solid #333; color:#666; padding:6px 14px; border-radius:8px; cursor:pointer; font-size:10px; font-weight:800;">LOGOUT</button></div>
</nav>
<aside>
    <div class="side-item active" onclick="setContext('home', this)">🏠 Feed</div>
    <div class="side-item" onclick="setContext('imageboard', this)">🖼️ Images</div>
    <div class="side-item" onclick="setContext('studio', this)">📁 Studio</div>
    <div class="side-item" onclick="openUpload()">📤 Upload</div>
</aside>
<main><div class="grid" id="v-grid">Loading Videos...</div></main>
<div id="modal-upload" class="modal-overlay">
    <div class="modal-box">
        <h3>Upload Videos</h3>
        <input type="text" id="vid-name" placeholder="Title">
        <textarea id="vid-desc" placeholder="Description..." rows="2"></textarea>
        <div style="text-align:left; font-size:10px; color:var(--text-dim); margin:10px 0 5px">Video File:</div>
        <input type="file" id="vid-input">
        <div style="text-align:left; font-size:10px; color:var(--text-dim); margin:10px 0 5px">Custom Thumnail (Optional):</div>
        <input type="file" id="thumb-input" accept="image/*">
        <div class="prog-bg" id="prog-bg"><div class="prog-bar" id="prog-bar"></div></div>
        <button id="up-btn" onclick="handleUpload()" style="background:white;color:black;border:none;padding:15px;border-radius:12px;width:100%;font-weight:800;cursor:pointer;">UPLOAD</button>
        <p onclick="closeUpload()" style="color:#444;font-size:12px;margin-top:15px;cursor:pointer;">Cancel</p>
    </div>
</div>
<div id="modal-edit" class="modal-overlay">
    <div class="modal-box">
        <h3>Edit Details</h3>
        <input type="text" id="edit-title">
        <textarea id="edit-desc" rows="4"></textarea>
        <button onclick="saveEdit()" style="background:var(--primary);color:white;border:none;padding:15px;border-radius:12px;width:100%;font-weight:800;cursor:pointer;">SAVE CHANGES</button>
        <p onclick="closeEdit()" style="color:#444;font-size:12px;margin-top:15px;cursor:pointer;">Cancel</p>
    </div>
</div>
<div id="player-page">
    <div class="player-layout">
        <div>
            <div style="padding:0 0 20px"><span onclick="closePlayer()" style="cursor:pointer; font-weight:800; color:var(--text-dim)">← EXIT</span></div>
            <div class="video-wrapper" id="p-target"></div>
            <div style="margin-top:20px; padding:20px; background:rgba(255,255,255,0.03); border-radius:16px; border:1px solid var(--border)">
                <h1 id="p-title" style="margin:0; font-size:24px"></h1>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px; padding-bottom:15px; border-bottom:1px solid var(--border)">
                    <div style="display:flex; align-items:center; gap:12px">
                        <div id="p-avatar" class="v-avatar" style="background:var(--primary); color:black"></div>
                        <div><div id="p-uploader" style="font-weight:800; font-size:14px"></div><div id="p-subs" style="font-size:12px; color:var(--text-dim)">0 subs</div></div>
                        <button id="sub-btn" class="sub-btn" onclick="toggleSub()">SUBSCRIBE</button>
                    </div>
                    <button onclick="handleLike()" style="background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); padding:8px 15px; border-radius:100px; cursor:pointer">❤️ <span id="p-likes">0</span></button>
                </div>
                <div id="p-views" style="font-size:13px; font-weight:bold; margin-top:15px">0 views</div>
                <p id="p-desc-content" style="color:var(--text-dim); margin-top:10px; line-height:1.6; white-space:pre-wrap"></p>
            </div>
        </div>
        <div id="rec-grid" style="display:flex; flex-direction:column; gap:15px"></div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const CLOUD_NAME = 'dncftuhoo', UPLOAD_PRESET = 'cemabyss', SUPABASE_URL = 'https://xqvvwejwkmqdmsorqdzp.supabase.co', SUPABASE_KEY = 'sb_publishable_WLR6XzQijI3h1-oWa6T-mg_FeolGe9z', ADMIN_USER = "Zoro";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = localStorage.getItem('cem_user'), allVideos = [], currentCtx = 'home', activeVideo = null, activeEditId = null;
    function init() { if(!currentUser) document.getElementById('auth-shield').style.display = 'flex'; else { fetchData(); document.getElementById('user-display').innerText = `@${currentUser.toUpperCase()}`; ensureProfile(currentUser); } }
    async function ensureProfile(user) { const { data } = await supabaseClient.from('profiles').select('*').eq('username', user).single(); if(!data) await supabaseClient.from('profiles').insert([{ username: user, subscribers: 0 }]); }
    async function fetchData() { const { data, error } = await supabaseClient.from('videos').select('*').order('id', { ascending: false }); if(!error) { allVideos = data; render(); } }
    function handleSearch() { render(); }
    function setContext(ctx, el) { currentCtx = ctx; document.querySelectorAll('.side-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); render(); }
    function render() {
        const grid = document.getElementById('v-grid'), q = document.getElementById('main-search').value.toLowerCase();
        let list = allVideos.filter(v => (v.title||"Untitled").toLowerCase().includes(q) || (v.uploader||"").toLowerCase().includes(q));
        if (currentCtx === 'imageboard') list = list.filter(v => v.url && v.url.match(/\.(jpg|jpeg|png|webp|gif)$/i));
        else if (currentCtx === 'home') list = list.filter(v => v.url && !v.url.match(/\.(jpg|jpeg|png|webp|gif)$/i));
        else if (currentCtx === 'studio') list = list.filter(v => v.uploader === currentUser);
        if(list.length === 0) { grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:gray">No data found in this sector.</p>`; return; }
        grid.innerHTML = list.map(v => {
            const isOwner = currentUser === ADMIN_USER || v.uploader === currentUser, col = getCol(v.uploader);
            return `<div class="card"><div class="dots-btn" onclick="toggleMenu(event, '${v.id}')">⋮</div><div id="menu-${v.id}" class="dropdown">${isOwner ? `<div onclick="openEdit('${v.id}', '${v.title}', '${encodeURIComponent(v.details || '')}')">📝 Edit</div><div onclick="deleteVideo('${v.id}')" style="color:red">🗑️ Delete</div>` : ''}</div><div class="v-thumb-wrap" onclick="playVideo('${v.id}')" style="background:${col.grad}"><img src="${v.thumb || ''}" class="v-img-prev" onerror="this.style.display='none'"></div><div class="v-info"><div class="v-avatar" style="background:${col.main}; color:black;">${v.uploader ? v.uploader[0] : 'U'}</div><div style="flex:1; overflow:hidden"><div style="font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${v.title || 'Untitled'}</div><div style="font-size:11px; color:var(--text-dim)">${v.uploader} • ${v.views || 0} views</div></div></div></div>`;
        }).join('');
    }
    async function handleUpload() {
        const vFile = document.getElementById('vid-input').files[0], tFile = document.getElementById('thumb-input').files[0]; if(!vFile) return alert("Select Media");
        document.getElementById('up-btn').disabled = true; document.getElementById('prog-bg').style.display = 'block'; const bar = document.getElementById('prog-bar'); bar.style.width = "20%";
        const up = async (file) => { const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', UPLOAD_PRESET); const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: "POST", body: fd }); return await r.json(); };
        try {
            const vData = await up(vFile); bar.style.width = "60%";
            if(!vData.secure_url) throw new Error("Cloudinary transfer failed.");
            let tUrl = vData.resource_type === 'video' ? vData.secure_url.replace(/\.[^/.]+$/, ".jpg") : vData.secure_url;
            if(tFile) { const tData = await up(tFile); tUrl = tData.secure_url; }
            const { error } = await supabaseClient.from('videos').insert([{ title: document.getElementById('vid-name').value || vFile.name, uploader: currentUser, url: vData.secure_url, thumb: tUrl, details: document.getElementById('vid-desc').value, views: 0, likes: 0 }]);
            if(error) alert("Supabase Error: " + error.message); else location.reload();
        } catch(e) { alert("Neural Uplink Fail: " + e.message); }
        document.getElementById('up-btn').disabled = false;
    }
    async function playVideo(id) {
        activeVideo = allVideos.find(v => v.id == id); document.getElementById('player-page').style.display = 'block';
        document.getElementById('p-title').innerText = activeVideo.title || "Untitled"; document.getElementById('p-uploader').innerText = activeVideo.uploader;
        document.getElementById('p-avatar').innerText = activeVideo.uploader ? activeVideo.uploader[0] : 'U'; document.getElementById('p-desc-content').innerText = activeVideo.details || "";
        document.getElementById('p-views').innerText = `${(activeVideo.views || 0) + 1} views`; document.getElementById('p-likes').innerText = activeVideo.likes || 0;
        const t = document.getElementById('p-target'); if(activeVideo.url && activeVideo.url.match(/\.(jpg|jpeg|png|webp|gif)$/i)) t.innerHTML = `<img src="${activeVideo.url}" class="large-img">`;
        else t.innerHTML = `<video controls autoplay src="${activeVideo.url || ''}" style="width:100%"></video>`;
        await supabaseClient.from('videos').update({ views: (activeVideo.views || 0) + 1 }).eq('id', id);
        const { data: prof } = await supabaseClient.from('profiles').select('subscribers').eq('username', activeVideo.uploader).single();
        document.getElementById('p-subs').innerText = `${prof?.subscribers || 0} subs`;
    }
    async function toggleSub() {
        const isSubbed = document.getElementById('sub-btn').classList.toggle('active'); document.getElementById('sub-btn').innerText = isSubbed ? "SUBSCRIBED" : "SUBSCRIBE";
        const { data } = await supabaseClient.from('profiles').select('subscribers').eq('username', activeVideo.uploader).single();
        const n = isSubbed ? ((data?.subscribers || 0) + 1) : Math.max(0, (data?.subscribers || 0) - 1);
        await supabaseClient.from('profiles').update({ subscribers: n }).eq('username', activeVideo.uploader); document.getElementById('p-subs').innerText = `${n} subs`;
    }
    async function handleLike() { const n = (activeVideo.likes || 0) + 1; await supabaseClient.from('videos').update({ likes: n }).eq('id', activeVideo.id); document.getElementById('p-likes').innerText = n; }
    function openEdit(id, title, desc) { activeEditId = id; document.getElementById('edit-title').value = title; document.getElementById('edit-desc').value = decodeURIComponent(desc); document.getElementById('modal-edit').style.display = 'flex'; }
    async function saveEdit() { await supabaseClient.from('videos').update({ title: document.getElementById('edit-title').value, details: document.getElementById('edit-desc').value }).eq('id', activeEditId); location.reload(); }
    async function deleteVideo(id) { if(confirm("Erase record?")) { await supabaseClient.from('videos').delete().eq('id', id); location.reload(); } }
    function toggleMenu(e, id) { e.stopPropagation(); closeAllMenus(); document.getElementById(`menu-${id}`).style.display = 'block'; }
    function closeAllMenus() { document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none'); }
    function getCol(n) { let name = n || "U", h = 0; for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h); const hue = Math.abs(h) % 360; return { main: `hsl(${hue}, 70%, 60%)`, grad: `linear-gradient(135deg, hsl(${hue}, 80%, 15%) 0%, #000 100%)` }; }
    function logout() { localStorage.removeItem('cem_user'); location.reload(); }
    function closePlayer() { document.getElementById('player-page').style.display = 'none'; document.getElementById('p-target').innerHTML = ""; }
    function openUpload() { document.getElementById('modal-upload').style.display = 'flex'; }
    function closeUpload() { document.getElementById('modal-upload').style.display = 'none'; }
    function closeEdit() { document.getElementById('modal-edit').style.display = 'none'; }
    function handleAuth() { const u = document.getElementById('login-user').value.trim(), p = document.getElementById('login-pass').value.trim(); if(!u || !p) return; if(u === ADMIN_USER && p !== "cemboy") return alert("Admin Credentials Reject"); if(u !== ADMIN_USER && p !== "hi") return alert("User Credentials Reject"); localStorage.setItem('cem_user', u); location.reload(); }
    init();
</script>
</body>
</html>
